name: "Default Deploy"
description: "Builds and Deploys to specified environment"

inputs:
  env:
    description: "The environment to deploy to"
    required: true
    default: "production"
  ssh-user:
    description: "SSH user to use"
    required: true
  ssh-host:
    description: "SSH host to use"
    required: true
  ssh-port:
    description: "SSH port to use"
    required: false
    default: "22"
  ssh-key:
    description: "SSH key to add"
    required: true
  destination-path:
    description: "Path to public_html on the web server"
    required: true
  wp-theme:
    description: "The directory name of the WordPress Theme"
    required: true
  auth-json:
    description: "Contains authentication for paid plugins to be installed using composer"
    required: true
  dot-env:
    description: ".env contents"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Git checkout
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.3"
        tools: composer:v2

    - name: Add auth.json and .env
      shell: bash
      run: |
        printf '%s' '${{ inputs.auth-json }}' > "$GITHUB_WORKSPACE/auth.json"
        printf '%s' '${{ inputs.dot-env }}' > "$GITHUB_WORKSPACE/.env"

    - name: Diagnose Composer
      shell: bash
      run: |
        composer --version
        composer diagnose || true

    - name: Install composer dependencies at root
      uses: ramsey/composer-install@v3
      with:
        composer-options: "--no-dev --optimize-autoloader --no-interaction --no-progress"

    - name: Install composer dependencies in theme
      uses: ramsey/composer-install@v3
      with:
        composer-options: "--no-dev --optimize-autoloader --no-interaction --no-progress"
        working-directory: "wp-content/themes/${{ inputs.wp-theme }}"

    - name: Remove unnecessary files
      shell: bash
      run: |
        rm -f "wp-content/themes/${{ inputs.wp-theme }}/composer.json"
        if [ "${{ inputs.wp-theme }}" != "aseven-notheme" ]; then
          rm -f "wp-content/themes/${{ inputs.wp-theme }}/package.json"
          rm -f "wp-content/themes/${{ inputs.wp-theme }}/src/input.css"
        fi

    - name: Add SSH key to this runner
      uses: atticusseven/.github/actions/add-ssh-key@main
      with:
        ssh-user: ${{ inputs.ssh-user }}
        ssh-port: ${{ inputs.ssh-port }}
        ssh-host: ${{ inputs.ssh-host }}
        ssh-key: ${{ inputs.ssh-key }}

    - name: Rsync to remote
      shell: bash
      run: |
        rsync -avPC --delete --no-perms \
          --include-from='.rsyncinclude' \
          --exclude-from='.rsyncignore' \
          . "server:${{ inputs.destination-path }}"

    - name: Install WP-CLI
      shell: bash
      run: |
        curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        chmod +x wp-cli.phar
        sudo mv wp-cli.phar /usr/local/bin/wp
        wp --info

    - name: Activate production plugins
      if: ${{ inputs.env == 'production' }}
      shell: bash
      run: |
        wp plugin activate --exclude=password-protected,disable-emails --all \
          --skip-plugins --skip-themes \
          --ssh="server:${{ inputs.destination-path }}"

    - name: Activate dev/staging plugins
      if: ${{ inputs.env == 'dev' || inputs.env == 'staging' }}
      shell: bash
      run: |
        wp plugin activate --exclude=updraftplus --all \
          --skip-plugins --skip-themes \
          --ssh="server:${{ inputs.destination-path }}"

    - name: Update database
      shell: bash
      run: |
        wp core update-db --skip-plugins --skip-themes \
          --ssh="server:${{ inputs.destination-path }}"

    - name: Flush rewrite rules
      shell: bash
      run: |
        wp rewrite flush --skip-plugins --skip-themes \
          --ssh="server:${{ inputs.destination-path }}"